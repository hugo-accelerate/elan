site_name: Elan
site_description: Graph-native orchestration for dynamic agent and data workflows.
site_url: https://accelerate-lux.github.io/elan/
repo_url: https://github.com/Accelerate-lux/elan
repo_name: Accelerate-lux/elan
exclude_docs: |
  internals/
  test_plan.md
  demo_ideas_catalog.md
not_in_nav: |
  comparison/baseline_workflow.md

theme:
  name: material
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_root_toc_entry: false
            inherited_members: false
            docstring_style: google

markdown_extensions:
  - admonition
  - tables
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.inlinehilite

nav:
  - Home: index.md
  - Basics: basics.md
  - API:
      - Overview: api.md
      - Python Reference: reference/python-api.md
  - Design Philosophy: design_philosophy.md
  - Comparisons:
      - Summary: comparison/summary.md
      - Dynamic Models: comparison/dynamic_models.md
      - Airflow: comparison/airflow.md
      - Dagster: comparison/dagster.md
      - LangGraph: comparison/langgraph.md
      - Metaflow: comparison/metaflow.md
      - Prefect: comparison/prefect.md
      - Temporal: comparison/temporal.md
