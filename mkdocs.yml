site_name: Elan
site_description: Graph-native orchestration for dynamic agent and data workflows.
site_url: https://accelerate-lux.github.io/elan/
repo_url: https://github.com/Accelerate-lux/elan
repo_name: Accelerate-lux/elan
exclude_docs: |
  internals/
  test_plan.md
  demo_ideas_catalog.md
  design_philosophy.md
  explanations/
  comparison/
not_in_nav: |
  comparison/baseline_workflow.md
  api.md
  basics.md

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
  features:
    - navigation.sections
    - navigation.expand
    - content.code.copy
    - search.suggest
    - search.highlight

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            show_root_toc_entry: false
            inherited_members: false
            docstring_style: google

markdown_extensions:
  - admonition
  - tables
  - pymdownx.highlight:
      use_pygments: true
      pygments_style: github-dark
      pygments_lang_class: true
  - pymdownx.superfences
  - pymdownx.inlinehilite

extra_css:
  - stylesheets/extra.css
  - stylesheets/pygments-github-dark.css

nav:
  - Home: index.md
  - Learn:
      - Getting Started: learn/getting-started.md
      - Core Concepts: learn/core-concepts.md
      - Recommended Patterns: learn/recommended-patterns.md
      - Next Steps: learn/next-steps.md
  - Guides:
      - Linear Workflows: guides/linear-workflows.md
      - Data Binding: guides/data-binding.md
      - Branching: guides/branching.md
      - Join on Result: guides/join-result.md
      - Context: guides/context.md
      - Composition: guides/composition.md
      - Dynamic Execution: guides/dynamic-execution.md
  - Reference:
      - API Overview: reference/api.md
      - Runtime Behavior: reference/runtime-behavior.md
      - Python API: reference/python-api.md
